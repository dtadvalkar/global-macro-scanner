[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    smoke: quick sanity checks, no external dependencies
    unit: isolated logic tests, no DB or network
    integration: multi-component tests
    requires_db: needs a live PostgreSQL connection
    requires_ibkr: needs TWS running and connected
    requires_internet: needs live internet (YFinance, etc.)
